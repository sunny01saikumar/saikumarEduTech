name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Launcher Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build Release APK
        run: flutter build apk --release --verbose > build.log 2>&1

      - name: Push Build Log on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b build-logs
          git add -f build.log
          git commit -m "Upload build log on failure [skip ci]"
          git push origin build-logs --force

      - name: Upload Release APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: java-master-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
