name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Launcher Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build Release APK
        run: flutter build apk --release --verbose > build.log 2>&1

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=================== SEARCHING FOR KOTLIN COMPILER ERRORS ==================="
          grep -i -C 3 -E "e: |error:" build.log || true
          echo "=================== LAST 500 LINES OF LOG ==================="
          tail -n 500 build.log
          echo "=========================================================================="

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log

      - name: Upload Release APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: java-master-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
