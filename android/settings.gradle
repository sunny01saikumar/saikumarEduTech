include ':app'

def localProperties = new Properties()
def localPropertiesFile = new File(settingsDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty('flutter.sdk')
if (flutterSdkPath == null) {
    throw new GradleException("flutter.sdk not set in local.properties")
}

evaluate(new File("${flutterSdkPath}/packages/flutter_tools/gradle/settings.gradle"))
