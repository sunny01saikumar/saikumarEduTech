name: saikumaredutech_javamaster
description: SaiKumarEduTech - Java Master. An offline-first Java interview and learning Android application.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  google_mobile_ads: ^5.1.0
  share_plus: ^10.1.0
  flutter_markdown: ^0.7.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/json/
    - assets/images/
